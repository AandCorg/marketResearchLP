<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" data-config-meta="description" />
    <title data-config-title>市場調査AI</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script src="assets/js/config.js" defer></script>
    <script src="assets/js/main.js" defer></script>
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="#top" aria-label="トップへ">
        <span class="brand-mark" aria-hidden="true"></span>
        <span data-brand-name></span>
      </a>
      <nav class="site-nav" aria-label="主要ナビゲーション" data-nav></nav>
      <div class="header-actions" data-header-actions></div>
    </header>

    <main id="top">
      <section class="hero" data-hero>
        <img class="hero-image" src="" alt="" data-hero-image />
        <div class="hero-overlay" aria-hidden="true"></div>
        <div class="container hero-inner">
          <div class="hero-copy">
            <p class="eyebrow" data-hero-eyebrow></p>
            <h1 data-hero-title></h1>
            <p class="hero-lead" data-hero-lead></p>
            <div class="hero-actions" data-hero-actions></div>
            <ul class="hero-points" data-hero-points></ul>
          </div>
          <div class="hero-panel" data-hero-panel></div>
        </div>
      </section>

      <section class="section problem-section" id="problem">
        <div class="container">
          <div class="section-heading">
            <p class="eyebrow" data-problem-eyebrow></p>
            <h2 data-problem-title></h2>
            <p data-problem-lead></p>
          </div>
          <div class="problem-grid" data-problems></div>
        </div>
      </section>

      <section class="section solution-section" id="solution">
        <div class="container">
          <div class="section-heading">
            <p class="eyebrow" data-solution-eyebrow></p>
            <h2 data-solution-title></h2>
            <p data-solution-lead></p>
          </div>
          <div class="solution-steps" data-solution-steps></div>
        </div>
      </section>

      <section class="section workflow-section" id="workflow">
        <div class="container">
          <div class="section-heading compact">
            <p class="eyebrow" data-workflow-eyebrow></p>
            <h2 data-workflow-title></h2>
            <p data-workflow-lead></p>
          </div>
          <ol class="workflow-list" data-workflow></ol>
        </div>
      </section>

      <section class="section usecase-section" id="usecases">
        <div class="container">
          <div class="section-heading">
            <p class="eyebrow" data-usecase-eyebrow></p>
            <h2 data-usecase-title></h2>
            <p data-usecase-lead></p>
          </div>
          <div class="usecase-grid" data-usecases></div>
        </div>
      </section>

      <section class="section pricing-section" id="pricing">
        <div class="container">
          <div class="section-heading compact">
            <p class="eyebrow" data-pricing-eyebrow></p>
            <h2 data-pricing-title></h2>
            <p data-pricing-lead></p>
          </div>
          <div class="pricing-grid" data-pricing></div>
          <p class="pricing-note" data-pricing-note></p>
        </div>
      </section>

      <section class="section faq-section" id="faq">
        <div class="container faq-layout">
          <div class="section-heading">
            <p class="eyebrow" data-faq-eyebrow></p>
            <h2 data-faq-title></h2>
            <p data-faq-lead></p>
          </div>
          <div class="faq-list" data-faq></div>
        </div>
      </section>

      <section class="section contact-section" id="contact">
        <div class="container contact-layout">
          <div class="contact-copy">
            <p class="eyebrow" data-contact-eyebrow></p>
            <h2 data-contact-title></h2>
            <p data-contact-lead></p>
            <ul class="contact-points" data-contact-points></ul>
          </div>
          <form class="contact-form" data-contact-form>
            <div data-form-fields></div>
            <button class="button primary full" type="submit" data-contact-submit></button>
            <p class="form-note" data-contact-note></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <a class="brand footer-brand" href="#top">
            <span class="brand-mark" aria-hidden="true"></span>
            <span data-footer-brand></span>
          </a>
          <p data-footer-description></p>
        </div>
        <div class="footer-links" data-footer-links></div>
      </div>
    </footer>
  </body>
</html>
